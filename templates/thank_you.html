<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACRE - FUSE - Thank You</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: rgba(250, 204, 21, 0.1);
            color: #facc15;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 30px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #facc15;
            font-size: 42px;
            margin-bottom: 10px;
        }

        p {
            color: #a1a1aa;
            font-size: 16px;
            max-width: 500px;
            line-height: 1.6;
            margin: 0 auto 40px;
        }

        .home-btn {
            padding: 16px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            background-color: transparent;
            color: #e4e4e7;
            border: 1px solid #3f3f46;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .home-btn:hover {
            background-color: #27272a;
            color: white;
        }
    </style>
</head>

<body>
    <div class="icon-circle">
        <i class="fa-solid fa-check"></i>
    </div>
    <h1>Thank You!</h1>
    <p>Your evaluation has been successfully recorded. Time and feedback provided directly refines the ACRE - FUSE
        clustering algorithm and leads to superior results over time.</p>
    <a href="{{ url_for('home') }}" class="home-btn">Return to Home</a>
</body>

</html>
